<!DOCTYPE html>
<html>
<head>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#1a1a2e; font-family:Arial,sans-serif; }
  #container { width:100%; height:100%; touch-action:none; }
  #info {
    position:absolute; bottom:8px; left:50%;
    transform:translateX(-50%);
    color:rgba(255,255,255,0.6); font-size:11px;
    pointer-events:none; z-index:100;
    background:rgba(0,0,0,0.3);
    padding:4px 14px; border-radius:12px;
    white-space:nowrap;
  }
  #frame-indicator {
    position:absolute; top:8px; left:50%;
    transform:translateX(-50%);
    color:rgba(255,255,255,0.8); font-size:13px;
    pointer-events:none; z-index:100;
    background:rgba(0,0,0,0.5);
    padding:4px 16px; border-radius:12px;
    opacity:0; transition: opacity 0.3s;
  }
  #frame-indicator.visible { opacity:1; }
</style>
</head>
<body>
<div id="container"></div>
<div id="frame-indicator"></div>
<div id="info"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ===== STREAMLIT COMPONENT COMMUNICATION =====
function sendMessageToStreamlit(type, data) {
  window.parent.postMessage(Object.assign({ isStreamlitMessage: true, type: type }, data), "*");
}
function setComponentValue(value) {
  sendMessageToStreamlit("streamlit:setComponentValue", { value: value });
}
function setFrameHeight(height) {
  sendMessageToStreamlit("streamlit:setFrameHeight", { height: height });
}
function signalReady() {
  sendMessageToStreamlit("streamlit:componentReady", { apiVersion: 1 });
}

// ===== CONFIG =====
const CW = 40, CH = 20;
const HALF_CW = CW / 2, HALF_CH = CH / 2;
const PENALTY_LEN = 6, PENALTY_W = 12, CENTER_R = 3;
const GOAL_W = 3, GOAL_H = 2, GOAL_D = 1;
const isMobile = window.innerWidth < 768;
const FRAME_H = isMobile ? 400 : 600;
const ANIM_SPEED = 0.6;

// ===== RENDERER =====
const container = document.getElementById('container');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(container.clientWidth, FRAME_H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x1a1a2e);
container.appendChild(renderer.domElement);

// ===== SCENE =====
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x1a1a2e, 60, 90);

// ===== CAMERA — top-down by default =====
const camera = new THREE.PerspectiveCamera(45, container.clientWidth / FRAME_H, 0.1, 200);
camera.position.set(0, 38, 0.01);
camera.lookAt(0, 0, 0);

// ===== ORBIT CONTROLS =====
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI / 2.05;
controls.minDistance = 8;
controls.maxDistance = 60;
controls.target.set(0, 0, 0);
controls.update();

// ===== LIGHTING =====
scene.add(new THREE.AmbientLight(0xffffff, 0.55));

const mainLight = new THREE.DirectionalLight(0xffffff, 1.0);
mainLight.position.set(15, 30, 10);
mainLight.castShadow = true;
mainLight.shadow.mapSize.width = 2048;
mainLight.shadow.mapSize.height = 2048;
mainLight.shadow.camera.left = -25;
mainLight.shadow.camera.right = 25;
mainLight.shadow.camera.top = 15;
mainLight.shadow.camera.bottom = -15;
mainLight.shadow.camera.near = 1;
mainLight.shadow.camera.far = 60;
mainLight.shadow.bias = -0.001;
scene.add(mainLight);

const fillLight = new THREE.DirectionalLight(0xffffff, 0.35);
fillLight.position.set(-10, 20, -10);
scene.add(fillLight);

// Subtle hemisphere light for sky/ground color
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x2d8a4e, 0.15));

// ===== COURT =====
function createCourt() {
  const group = new THREE.Group();
  const Y = 0.01;

  // Court surface (main playing area)
  const surfGeo = new THREE.PlaneGeometry(CW, CH);
  const surfMat = new THREE.MeshStandardMaterial({ color: 0x2d8a4e, roughness: 0.85, metalness: 0.0 });
  const surface = new THREE.Mesh(surfGeo, surfMat);
  surface.rotation.x = -Math.PI / 2;
  surface.receiveShadow = true;
  group.add(surface);

  // Surround area (darker green border)
  const borderGeo = new THREE.PlaneGeometry(CW + 6, CH + 6);
  const borderMat = new THREE.MeshStandardMaterial({ color: 0x1e6b3a, roughness: 0.9 });
  const border = new THREE.Mesh(borderGeo, borderMat);
  border.rotation.x = -Math.PI / 2;
  border.position.y = -0.01;
  border.receiveShadow = true;
  group.add(border);

  // Line helper
  const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 });
  function addLine(pts) {
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), lineMat));
  }

  // Outer boundary
  addLine([
    new THREE.Vector3(-HALF_CW, Y, -HALF_CH),
    new THREE.Vector3(HALF_CW, Y, -HALF_CH),
    new THREE.Vector3(HALF_CW, Y, HALF_CH),
    new THREE.Vector3(-HALF_CW, Y, HALF_CH),
    new THREE.Vector3(-HALF_CW, Y, -HALF_CH),
  ]);

  // Center line
  addLine([new THREE.Vector3(0, Y, -HALF_CH), new THREE.Vector3(0, Y, HALF_CH)]);

  // Center circle
  const cc = [];
  for (let i = 0; i <= 64; i++) {
    const a = (i / 64) * Math.PI * 2;
    cc.push(new THREE.Vector3(Math.cos(a) * CENTER_R, Y, Math.sin(a) * CENTER_R));
  }
  addLine(cc);

  // Center spot
  const spotGeo = new THREE.CircleGeometry(0.2, 16);
  const spotMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const cSpot = new THREE.Mesh(spotGeo, spotMat);
  cSpot.rotation.x = -Math.PI / 2;
  cSpot.position.y = 0.02;
  group.add(cSpot);

  // Penalty areas
  const hpw = PENALTY_W / 2;
  addLine([
    new THREE.Vector3(-HALF_CW, Y, -hpw),
    new THREE.Vector3(-HALF_CW + PENALTY_LEN, Y, -hpw),
    new THREE.Vector3(-HALF_CW + PENALTY_LEN, Y, hpw),
    new THREE.Vector3(-HALF_CW, Y, hpw),
  ]);
  addLine([
    new THREE.Vector3(HALF_CW, Y, -hpw),
    new THREE.Vector3(HALF_CW - PENALTY_LEN, Y, -hpw),
    new THREE.Vector3(HALF_CW - PENALTY_LEN, Y, hpw),
    new THREE.Vector3(HALF_CW, Y, hpw),
  ]);

  // Penalty arcs
  const lArc = [];
  for (let i = 0; i <= 32; i++) {
    const a = -Math.PI / 2 + (i / 32) * Math.PI;
    lArc.push(new THREE.Vector3(-HALF_CW + PENALTY_LEN + Math.cos(a) * CENTER_R, Y, Math.sin(a) * CENTER_R));
  }
  addLine(lArc);
  const rArc = [];
  for (let i = 0; i <= 32; i++) {
    const a = Math.PI / 2 + (i / 32) * Math.PI;
    rArc.push(new THREE.Vector3(HALF_CW - PENALTY_LEN + Math.cos(a) * CENTER_R, Y, Math.sin(a) * CENTER_R));
  }
  addLine(rArc);

  // Penalty spots
  const psGeo = new THREE.CircleGeometry(0.15, 16);
  [-1, 1].forEach(side => {
    const ps = new THREE.Mesh(psGeo, spotMat);
    ps.rotation.x = -Math.PI / 2;
    ps.position.set(side * (HALF_CW - PENALTY_LEN), 0.02, 0);
    group.add(ps);
  });

  // Goals
  function addGoal(side) {
    const x = side === 'left' ? -HALF_CW : HALF_CW;
    const dir = side === 'left' ? -1 : 1;
    const postR = 0.06;
    const hgw = GOAL_W / 2;
    const postMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.85, roughness: 0.15 });
    const postGeo = new THREE.CylinderGeometry(postR, postR, GOAL_H, 8);

    // Left post
    const lp = new THREE.Mesh(postGeo, postMat);
    lp.position.set(x - dir * GOAL_D / 2, GOAL_H / 2, -hgw);
    lp.castShadow = true;
    group.add(lp);
    // Right post
    const rp = new THREE.Mesh(postGeo, postMat);
    rp.position.set(x - dir * GOAL_D / 2, GOAL_H / 2, hgw);
    rp.castShadow = true;
    group.add(rp);
    // Crossbar
    const barGeo = new THREE.CylinderGeometry(postR, postR, GOAL_W + postR * 2, 8);
    const bar = new THREE.Mesh(barGeo, postMat);
    bar.position.set(x - dir * GOAL_D / 2, GOAL_H, 0);
    bar.rotation.x = Math.PI / 2;
    bar.castShadow = true;
    group.add(bar);
    // Net
    const netGeo = new THREE.BoxGeometry(GOAL_D, GOAL_H, GOAL_W);
    const netMat = new THREE.MeshStandardMaterial({
      color: 0xffffff, transparent: true, opacity: 0.12, wireframe: true, side: THREE.DoubleSide,
    });
    const net = new THREE.Mesh(netGeo, netMat);
    net.position.set(x - dir * GOAL_D / 2, GOAL_H / 2, 0);
    group.add(net);
    // Back net panel (subtle)
    const backGeo = new THREE.PlaneGeometry(GOAL_H, GOAL_W);
    const backMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.06, side: THREE.DoubleSide });
    const back = new THREE.Mesh(backGeo, backMat);
    back.position.set(x - dir * GOAL_D, GOAL_H / 2, 0);
    back.rotation.y = Math.PI / 2;
    group.add(back);
  }
  addGoal('left');
  addGoal('right');

  return group;
}
scene.add(createCourt());

// ===== PLAYER SYSTEM =====
const TEAM_COLORS = {
  home:   { jersey: 0xe53e3e, dark: 0xc53030, shorts: 0x1a1a2e, skin: 0xf5d0a9, socks: 0xffffff, glove: 0xf5d0a9 },
  away:   { jersey: 0x3b82f6, dark: 0x2563eb, shorts: 0xf0f0f0, skin: 0xf5d0a9, socks: 0x1a1a2e, glove: 0xf5d0a9 },
  homeGK: { jersey: 0xf59e0b, dark: 0xd97706, shorts: 0x1a1a2e, skin: 0xf5d0a9, socks: 0xf59e0b, glove: 0xf59e0b },
  awayGK: { jersey: 0x10b981, dark: 0x059669, shorts: 0x1a1a2e, skin: 0xf5d0a9, socks: 0x10b981, glove: 0x10b981 },
};

function getColors(team, isGK) {
  if (isGK) return team === 'home' ? TEAM_COLORS.homeGK : TEAM_COLORS.awayGK;
  return team === 'home' ? TEAM_COLORS.home : TEAM_COLORS.away;
}

// Shared geometries (memory efficient)
const sharedGeo = {
  head: new THREE.SphereGeometry(0.18, 16, 16),
  body: new THREE.CapsuleGeometry(0.2, 0.5, 8, 16),
  arm: new THREE.CapsuleGeometry(0.06, 0.3, 4, 8),
  leg: new THREE.CapsuleGeometry(0.08, 0.4, 4, 8),
  shoe: new THREE.BoxGeometry(0.12, 0.08, 0.22),
  shadow: new THREE.CircleGeometry(0.5, 16),
  ring: new THREE.RingGeometry(0.6, 0.75, 32),
  hitbox: new THREE.CylinderGeometry(0.5, 0.5, 2, 8),
};

function createNumberTexture(number, bgColor) {
  const c = document.createElement('canvas');
  c.width = 128; c.height = 128;
  const ctx = c.getContext('2d');
  // Background circle
  const hex = '#' + bgColor.toString(16).padStart(6, '0');
  ctx.fillStyle = hex;
  ctx.beginPath();
  ctx.arc(64, 64, 56, 0, Math.PI * 2);
  ctx.fill();
  // Dark ring
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 4;
  ctx.stroke();
  // White border
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Number
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 60px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 3;
  ctx.fillText(number.toString(), 64, 67);
  return new THREE.CanvasTexture(c);
}

const playerObjects = [];
const playersGroup = new THREE.Group();
scene.add(playersGroup);

function createPlayer(data) {
  const isGK = data.number === 1;
  const col = getColors(data.team, isGK);
  const group = new THREE.Group();
  group.userData = { type: 'player', id: data.id };

  // Shadow
  const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 });
  const shadow = new THREE.Mesh(sharedGeo.shadow, shadowMat);
  shadow.rotation.x = -Math.PI / 2;
  shadow.position.y = 0.005;
  group.add(shadow);

  // Selection ring
  const ringMat = new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0, side: THREE.DoubleSide });
  const ring = new THREE.Mesh(sharedGeo.ring, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.02;
  group.add(ring);

  // Body group (for facing direction)
  const body = new THREE.Group();

  // Head
  const headMat = new THREE.MeshStandardMaterial({ color: col.skin, roughness: 0.7 });
  const head = new THREE.Mesh(sharedGeo.head, headMat);
  head.position.y = 1.65;
  head.castShadow = true;
  body.add(head);

  // Hair
  const hairGeo = new THREE.SphereGeometry(0.19, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
  const hairMat = new THREE.MeshStandardMaterial({ color: 0x3d2b1f, roughness: 0.9 });
  const hair = new THREE.Mesh(hairGeo, hairMat);
  hair.position.y = 1.65;
  body.add(hair);

  // Jersey / Body
  const jerseyMat = new THREE.MeshStandardMaterial({ color: col.jersey, roughness: 0.6 });
  const jersey = new THREE.Mesh(sharedGeo.body, jerseyMat);
  jersey.position.y = 1.15;
  jersey.castShadow = true;
  body.add(jersey);

  // Arms
  const armMat = new THREE.MeshStandardMaterial({ color: isGK ? col.glove : col.skin, roughness: 0.7 });
  const lArm = new THREE.Mesh(sharedGeo.arm, armMat);
  lArm.position.set(-0.3, 1.15, 0);
  lArm.castShadow = true;
  body.add(lArm);
  const rArm = new THREE.Mesh(sharedGeo.arm, armMat);
  rArm.position.set(0.3, 1.15, 0);
  rArm.castShadow = true;
  body.add(rArm);

  // Legs (shorts color)
  const legMat = new THREE.MeshStandardMaterial({ color: col.shorts, roughness: 0.6 });
  const lLeg = new THREE.Mesh(sharedGeo.leg, legMat);
  lLeg.position.set(-0.1, 0.5, 0);
  lLeg.castShadow = true;
  body.add(lLeg);
  const rLeg = new THREE.Mesh(sharedGeo.leg, legMat);
  rLeg.position.set(0.1, 0.5, 0);
  rLeg.castShadow = true;
  body.add(rLeg);

  // Shoes
  const shoeMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 });
  const lShoe = new THREE.Mesh(sharedGeo.shoe, shoeMat);
  lShoe.position.set(-0.1, 0.1, 0.05);
  lShoe.castShadow = true;
  body.add(lShoe);
  const rShoe = new THREE.Mesh(sharedGeo.shoe, shoeMat);
  rShoe.position.set(0.1, 0.1, 0.05);
  rShoe.castShadow = true;
  body.add(rShoe);

  // Face direction
  body.rotation.y = data.team === 'home' ? Math.PI / 2 : -Math.PI / 2;
  group.add(body);

  // Number sprite (always faces camera)
  const numTex = createNumberTexture(data.number, col.jersey);
  const spriteMat = new THREE.SpriteMaterial({ map: numTex, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.position.y = 2.15;
  sprite.scale.set(0.55, 0.55, 1);
  sprite.renderOrder = 1;
  group.add(sprite);

  // Invisible hitbox for raycasting
  const hitMat = new THREE.MeshBasicMaterial({ visible: false });
  const hitbox = new THREE.Mesh(sharedGeo.hitbox, hitMat);
  hitbox.position.y = 1;
  group.add(hitbox);

  // Position
  group.position.set(data.position.x, 0, data.position.z);
  playersGroup.add(group);

  const pObj = { group, body, ring, ringMat, shadow, shadowMat, data: { ...data }, lArm, rArm, lLeg, rLeg };
  playerObjects.push(pObj);
  return pObj;
}

// ===== BALL =====
let ballData = { x: 0, y: 0, z: 0 };
let ballGroup, ballMesh, ballPentagon, ballShadow, ballShadowMat, ballRingMat, ballHeightLine, ballHLineMat;

function createBall() {
  ballGroup = new THREE.Group();
  ballGroup.userData = { type: 'ball' };

  // Shadow
  const sGeo = new THREE.CircleGeometry(0.25, 16);
  ballShadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 });
  ballShadow = new THREE.Mesh(sGeo, ballShadowMat);
  ballShadow.rotation.x = -Math.PI / 2;
  ballShadow.position.y = 0.005;
  ballGroup.add(ballShadow);

  // Selection ring
  const rGeo = new THREE.RingGeometry(0.35, 0.45, 32);
  ballRingMat = new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0, side: THREE.DoubleSide });
  const bRing = new THREE.Mesh(rGeo, ballRingMat);
  bRing.rotation.x = -Math.PI / 2;
  bRing.position.y = 0.02;
  ballGroup.add(bRing);

  // Ball sphere
  const bGeo = new THREE.SphereGeometry(0.22, 20, 20);
  const bMat = new THREE.MeshStandardMaterial({ color: 0xf0f0f0, roughness: 0.35, metalness: 0.05 });
  ballMesh = new THREE.Mesh(bGeo, bMat);
  ballMesh.position.y = 0.22;
  ballMesh.castShadow = true;
  ballGroup.add(ballMesh);

  // Pentagon pattern
  const pGeo = new THREE.DodecahedronGeometry(0.19, 0);
  const pMat = new THREE.MeshStandardMaterial({ color: 0x222222, wireframe: true, transparent: true, opacity: 0.25 });
  ballPentagon = new THREE.Mesh(pGeo, pMat);
  ballPentagon.position.y = 0.22;
  ballGroup.add(ballPentagon);

  // Height line (hidden by default)
  const hlGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0.01, 0),
    new THREE.Vector3(0, 0.22, 0),
  ]);
  ballHLineMat = new THREE.LineDashedMaterial({ color: 0xffff00, transparent: true, opacity: 0, dashSize: 0.15, gapSize: 0.1 });
  ballHeightLine = new THREE.Line(hlGeo, ballHLineMat);
  ballHeightLine.computeLineDistances();
  ballGroup.add(ballHeightLine);

  // Hitbox (same size as player hitbox for easy selection)
  const hGeo = new THREE.CylinderGeometry(0.5, 0.5, 2, 8);
  const hMat = new THREE.MeshBasicMaterial({ visible: false });
  const hitbox = new THREE.Mesh(hGeo, hMat);
  hitbox.position.y = 1;
  ballGroup.add(hitbox);

  scene.add(ballGroup);
}
createBall();

// ===== DRAG SYSTEM =====
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
const planeIntersect = new THREE.Vector3();

let dragging = null;
let didDrag = false;
let selectedId = null;

function getGroundPoint(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  raycaster.ray.intersectPlane(groundPlane, planeIntersect);
  return planeIntersect;
}

function findHitObject(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const targets = [];
  playerObjects.forEach(p => p.group.traverse(c => { if (c.isMesh) targets.push(c); }));
  ballGroup.traverse(c => { if (c.isMesh) targets.push(c); });

  const hits = raycaster.intersectObjects(targets, false);
  if (hits.length === 0) return null;

  let obj = hits[0].object;
  while (obj && !obj.userData.type) obj = obj.parent;
  return obj;
}

function selectObject(id) {
  playerObjects.forEach(p => { p.ringMat.opacity = 0; });
  ballRingMat.opacity = 0;
  selectedId = id;
  if (id === 'ball') {
    ballRingMat.opacity = 1;
  } else if (id) {
    const pObj = playerObjects.find(p => p.data.id === id);
    if (pObj) pObj.ringMat.opacity = 1;
  }
}

let lastTapTime = 0;
let pendingDragEvent = null;
let dragRAF = null;

// CRITICAL: Use capture phase + stopImmediatePropagation to intercept events
// BEFORE OrbitControls processes them. This prevents camera movement when
// the user intends to drag a player or ball.
renderer.domElement.addEventListener('pointerdown', (e) => {
  if (e.button !== 0) return;

  const hit = findHitObject(e);
  if (!hit) {
    // Double-tap → toggle 2D ↔ 3D
    const now = Date.now();
    if (now - lastTapTime < 300) {
      toggleCameraView();
      lastTapTime = 0;
      e.stopImmediatePropagation(); // prevent OrbitControls
      return;
    }
    lastTapTime = now;
    selectObject(null);
    // Let OrbitControls handle camera rotation on empty area
    return;
  }

  // Hit a player or ball → block OrbitControls completely
  e.stopImmediatePropagation();
  e.preventDefault();
  lastTapTime = 0;

  if (hit.userData.type === 'player') {
    dragging = { type: 'player', id: hit.userData.id };
    selectObject(hit.userData.id);
  } else if (hit.userData.type === 'ball') {
    dragging = { type: 'ball' };
    selectObject('ball');
  }
  controls.enabled = false;
  didDrag = false;
}, { capture: true });

function processDrag(e) {
  const pt = getGroundPoint(e);
  const cx = Math.max(-HALF_CW, Math.min(HALF_CW, pt.x));
  const cz = Math.max(-HALF_CH, Math.min(HALF_CH, pt.z));

  if (dragging.type === 'player') {
    const pObj = playerObjects.find(p => p.data.id === dragging.id);
    if (pObj) {
      pObj.group.position.set(cx, 0, cz);
      pObj.data.position.x = cx;
      pObj.data.position.z = cz;
    }
  } else {
    ballGroup.position.set(cx, 0, cz);
    ballData.x = cx;
    ballData.z = cz;
  }
  didDrag = true;
}

renderer.domElement.addEventListener('pointermove', (e) => {
  if (!dragging) return;
  // Block OrbitControls while dragging
  e.stopImmediatePropagation();
  e.preventDefault();
  pendingDragEvent = e;
  if (!dragRAF) {
    dragRAF = requestAnimationFrame(() => {
      if (pendingDragEvent && dragging) processDrag(pendingDragEvent);
      pendingDragEvent = null;
      dragRAF = null;
    });
  }
}, { capture: true });

renderer.domElement.addEventListener('pointerup', (e) => {
  if (!dragging) return;
  // Block OrbitControls for this event
  e.stopImmediatePropagation();
  if (dragRAF) { cancelAnimationFrame(dragRAF); dragRAF = null; }
  pendingDragEvent = null;
  if (didDrag) {
    const positions = playerObjects.map(p => ({
      id: p.data.id,
      x: Math.round(p.data.position.x * 100) / 100,
      z: Math.round(p.data.position.z * 100) / 100,
    }));
    setComponentValue({
      players: positions,
      ball: { x: Math.round(ballData.x * 100) / 100, z: Math.round(ballData.z * 100) / 100 },
    });
  }
  dragging = null;
  didDrag = false;
  controls.enabled = true;
}, { capture: true });

// ===== CAMERA TOGGLE 2D ↔ 3D =====
let isTopDown = true;
let cameraAnim = null;
let saved3DPos = null; // remember user's last 3D camera angle

const CAM_TOPDOWN = { x: 0, y: 38, z: 0.01 };
const CAM_3D_DEFAULT = { x: 0, y: 22, z: 22 };

// Save camera position whenever user manually rotates/zooms
controls.addEventListener('end', () => {
  const p = camera.position;
  // If camera is not near top-down, save as 3D position
  if (p.y < 35) {
    saved3DPos = { x: p.x, y: p.y, z: p.z };
    isTopDown = false;
  }
});

function toggleCameraView() {
  if (cameraAnim) return;
  const from = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
  const to = isTopDown ? (saved3DPos || CAM_3D_DEFAULT) : CAM_TOPDOWN;
  isTopDown = !isTopDown;
  cameraAnim = { from, to, start: performance.now(), dur: 500 };
}

function updateCameraAnim() {
  if (!cameraAnim) return;
  const t = Math.min(1, (performance.now() - cameraAnim.start) / cameraAnim.dur);
  const e = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
  camera.position.set(
    cameraAnim.from.x + (cameraAnim.to.x - cameraAnim.from.x) * e,
    cameraAnim.from.y + (cameraAnim.to.y - cameraAnim.from.y) * e,
    cameraAnim.from.z + (cameraAnim.to.z - cameraAnim.from.z) * e,
  );
  controls.target.set(0, 0, 0);
  controls.update();
  if (t >= 1) cameraAnim = null;
}

// ===== FRAME ANIMATION =====
let framesData = [];
let isPlaying = false;
let animPhase = 0, animProgress = 0, lastAnimTime = 0;
const frameInd = document.getElementById('frame-indicator');

function lerp(a, b, t) { return a + (b - a) * t; }
function easeInOut(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }

function updateAnimation(ts) {
  if (!isPlaying || framesData.length < 2) {
    frameInd.classList.remove('visible');
    return;
  }
  if (!lastAnimTime) lastAnimTime = ts;
  const delta = (ts - lastAnimTime) / 1000;
  lastAnimTime = ts;

  animProgress += delta * ANIM_SPEED;
  frameInd.textContent = 'Frame ' + (animPhase + 1) + ' / ' + framesData.length;
  frameInd.classList.add('visible');

  if (animProgress >= 1) {
    animProgress = 0;
    animPhase++;
    if (animPhase >= framesData.length - 1) {
      const ff = framesData[framesData.length - 1];
      ff.players.forEach(fp => {
        const pObj = playerObjects.find(p => p.data.id === fp.id);
        if (pObj) {
          pObj.group.position.set(fp.position.x, 0, fp.position.z);
          pObj.data.position.x = fp.position.x;
          pObj.data.position.z = fp.position.z;
        }
      });
      ballGroup.position.set(ff.ball_position.x, 0, ff.ball_position.z);
      ballMesh.position.y = 0.22;
      ballPentagon.position.y = 0.22;
      ballShadowMat.opacity = 0.3;
      ballShadow.scale.setScalar(1);
      ballHLineMat.opacity = 0;

      animPhase = 0;
      isPlaying = false;
      frameInd.textContent = 'Complete';
      setTimeout(() => frameInd.classList.remove('visible'), 1500);
      return;
    }
  }

  const from = framesData[animPhase];
  const to = framesData[animPhase + 1];
  const t = easeInOut(animProgress);

  // Players
  from.players.forEach((fp, i) => {
    const tp = to.players[i];
    if (!tp) return;
    const pObj = playerObjects.find(p => p.data.id === fp.id);
    if (!pObj) return;
    const x = lerp(fp.position.x, tp.position.x, t);
    const z = lerp(fp.position.z, tp.position.z, t);
    pObj.group.position.set(x, 0, z);
    pObj.data.position.x = x;
    pObj.data.position.z = z;
  });

  // Ball
  const fb = from.ball_position;
  const tb = to.ball_position;
  ballData.x = lerp(fb.x, tb.x, t);
  ballData.z = lerp(fb.z, tb.z, t);
  ballGroup.position.set(ballData.x, 0, ballData.z);

  // Ball height
  const traj = to.ball_trajectory || "linear";
  const peak = to.ball_peak_height || 0;
  let ballH = 0;
  if (traj === "parabolic" && peak > 0) {
    ballH = 4 * peak * animProgress * (1 - animProgress);
  } else {
    ballH = lerp(fb.y || 0, tb.y || 0, t);
  }

  ballMesh.position.y = 0.22 + ballH;
  ballPentagon.position.y = 0.22 + ballH;

  if (ballH > 0.3) {
    ballShadowMat.opacity = Math.max(0.05, 0.3 - ballH * 0.03);
    ballShadow.scale.setScalar(Math.max(0.3, 1 - ballH * 0.08));
    ballHLineMat.opacity = 0.6;
    const pos = ballHeightLine.geometry.attributes.position;
    pos.setY(1, 0.22 + ballH);
    pos.needsUpdate = true;
    ballHeightLine.computeLineDistances();
  } else {
    ballShadowMat.opacity = 0.3;
    ballShadow.scale.setScalar(1);
    ballHLineMat.opacity = 0;
  }
}

// ===== SELECTION PULSE =====
let pulsePhase = 0;

function updatePulse(delta) {
  if (!selectedId) return;
  pulsePhase += delta * 3;
  const v = 0.5 + 0.5 * Math.sin(pulsePhase);
  if (selectedId === 'ball') {
    ballRingMat.opacity = 0.5 + 0.5 * v;
  } else {
    const pObj = playerObjects.find(p => p.data.id === selectedId);
    if (pObj) pObj.ringMat.opacity = 0.5 + 0.5 * v;
  }
}

// ===== RENDER LOOP =====
const clock = new THREE.Clock();

function animate(ts) {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  updateCameraAnim();
  updateAnimation(ts);
  updatePulse(delta);
  controls.update();
  renderer.render(scene, camera);
}
requestAnimationFrame(animate);

// ===== RESIZE =====
function onResize() {
  const w = container.clientWidth || window.innerWidth;
  camera.aspect = w / FRAME_H;
  camera.updateProjectionMatrix();
  renderer.setSize(w, FRAME_H);
}
window.addEventListener('resize', onResize);

// ===== STREAMLIT RENDER HANDLER =====
function onRender(args) {
  const newPlayers = args.players || [];
  const newBall = args.ball || { x: 0, y: 0, z: 0 };
  const newFrames = args.frames || [];
  const shouldPlay = args.is_playing || false;

  ballData = newBall;

  // Create players once, then update positions
  if (playerObjects.length === 0 && newPlayers.length > 0) {
    newPlayers.forEach(p => createPlayer(p));
  } else {
    newPlayers.forEach(pd => {
      const pObj = playerObjects.find(p => p.data.id === pd.id);
      if (pObj) {
        pObj.group.position.set(pd.position.x, 0, pd.position.z);
        pObj.data.position.x = pd.position.x;
        pObj.data.position.z = pd.position.z;
      }
    });
  }

  ballGroup.position.set(newBall.x, 0, newBall.z);

  framesData = newFrames;
  if (shouldPlay && newFrames.length > 1) {
    animPhase = 0;
    animProgress = 0;
    lastAnimTime = 0;
    isPlaying = true;
  }

  setFrameHeight(FRAME_H);
}

// Info text
document.getElementById('info').textContent = isMobile
  ? '드래그: 이동 | 빈 곳: 시점 | 더블탭: 2D/3D | 두 손가락: 줌'
  : '드래그: 이동 | 빈 곳 드래그: 시점 | 더블클릭: 2D/3D | 스크롤: 줌';

window.addEventListener("message", (event) => {
  if (event.data.type === "streamlit:render") {
    onRender(event.data.args);
  }
});

signalReady();
</script>
</body>
